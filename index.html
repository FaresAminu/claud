<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puter.js AI Generator</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; color: #333; }
        .controls, .auth-box { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; background: white; padding: 15px; border-radius: 5px; border: 1px solid #ddd; }
        select, button { padding: 10px 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #signInBtn { background-color: #27ae60; }
        #signInBtn:hover { background-color: #2ecc71; }
        textarea { width: 100%; height: 120px; padding: 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; margin-bottom: 20px; }
        #output { background-color: white; border: 1px solid #ddd; border-radius: 5px; padding: 25px; min-height: 150px; white-space: pre-wrap; line-height: 1.6; }
        .warning { background-color: #e74c3c; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="fileWarning" class="warning">
        ?? WARNING: You are running this file directly (file:///). The Puter login popup will stay blank! Please open this via a local web server (like VS Code Live Server).
    </div>

    <h1>?? Claude AI Text Generator</h1>
    <p>Powered by Puter.js</p>

    <div class="auth-box">
        <button id="signInBtn" onclick="signInToPuter()">1. Sign into Puter</button>
        <span id="authStatus">? Not signed in</span>
    </div>

    <div class="controls">
        <label for="modelSelect"><strong>2. Choose Model:</strong></label>
        <select id="modelSelect">
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (Default)</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5 (Fast)</option>
            <option value="claude-opus-4-6">Claude Opus 4.6 (Powerful)</option>
        </select>
    </div>

    <textarea id="promptInput" placeholder="Type your prompt here...">Explain how computer vision can be used to classify wheat grains.</textarea>
    
    <button id="generateBtn" onclick="generateResponse()">3. Generate Response</button>

    <h2>Output:</h2>
    <div id="output">Your AI generated response will stream here...</div>

    <script>
        // Check if the user is running the file locally without a server
        if (window.location.protocol === 'file:') {
            document.getElementById('fileWarning').style.display = 'block';
        }

        // Dedicated Sign In Function
        async function signInToPuter() {
            try {
                const user = await puter.auth.signIn();
                document.getElementById('authStatus').innerHTML = `? Signed in as: <strong>${user.username}</strong>`;
                document.getElementById('signInBtn').style.display = 'none'; // Hide button after login
            } catch (error) {
                alert("Sign-in failed or was cancelled.");
            }
        }

        async function generateResponse() {
            const prompt = document.getElementById('promptInput').value;
            const model = document.getElementById('modelSelect').value;
            const outputDiv = document.getElementById('output');
            const generateBtn = document.getElementById('generateBtn');

            if (!prompt.trim()) return alert("Please enter a prompt!");

            outputDiv.innerHTML = '<span style="color: #7f8c8d; font-style: italic;">Generating response... (If the popup appears, please sign in)</span>';
            generateBtn.disabled = true;

            try {
                const response = await puter.ai.chat(prompt, { model: model, stream: true });
                outputDiv.innerHTML = ""; 

                for await (const part of response) {
                    outputDiv.innerHTML += part?.text || '';
                }
            } catch (error) {
                outputDiv.innerHTML = `<span style="color: red;"><strong>Error:</strong> ${error.message}</span>`;
            } finally {
                generateBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
